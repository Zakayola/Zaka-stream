[package]
name = "zaka-stream-contract"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
description = "Zaka-Stream: Decentralized token streaming contract for Stellar/Soroban"
repository = "https://github.com/zakayola/Zaka-Stream"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[dependencies]
soroban-sdk = { version = "22.0.1" }

[dev-dependencies]
soroban-sdk = { version = "22.0.1", features = ["testutils"] }

[features]
testutils = ["soroban-sdk/testutils"]
